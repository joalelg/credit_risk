stages:
  data_prep:
    cmd: python -m prepare_data
    wdir: src
    deps:
    - python -m prepare_data.py
    - ../data/raw/credit_risk_dataset.csv
    outs:
    - data/processed/credit_risk_prepared.csv
  train:
    cmd: python -m train
    deps:
    - src/train.py
    - ./data/processed/credit_risk_prepared.csv
    outs:
    - models/automl_best_mdl.pkl
